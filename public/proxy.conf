# 前端路由处理
location / {
    try_files $uri $uri/ /index.html;

    # HTML文件禁用缓存
    if ($request_filename ~* .*\.html$) {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}

# 代理配置集群

location /api_server1936/ {
    proxy_pass http://123.121.147.7:1936/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cookie_domain ~(.+) localhost;
    proxy_cookie_path /app /api_app;
    add_header 'Access-Control-Allow-Origin' 'https://course.bjtu.top' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST' always;
}

location /api_app/ {
    proxy_pass http://123.121.147.7:8081/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cookie_domain ~(.+) localhost;
    proxy_cookie_path /app /api_app;
    add_header 'Access-Control-Allow-Origin' 'https://course.bjtu.top' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST' always;
}

location /api_mis/ {
    # 预检请求处理
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://mis.bjtu.edu.cn';
        add_header 'Access-Control-Allow-Methods' 'GET, POST';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
        return 204;
    }

    rewrite ^/api_mis/(.*) /$1 break;
    proxy_pass https://mis.bjtu.edu.cn/;
    proxy_set_header Host mis.bjtu.edu.cn;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cookie_domain ~(.+) localhost;
    proxy_cookie_path / /api_mis/;
    add_header 'Access-Control-Allow-Origin' 'https://mis.bjtu.edu.cn' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
}

location /api_cas/ {
    # 预检请求处理
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://hw.57d02.cn:8081';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Content-Length' 0;
        return 204;
    }

    proxy_pass https://cas.bjtu.edu.cn/;
    proxy_ssl_verify off;
    proxy_set_header Host cas.bjtu.edu.cn;
    proxy_set_header Origin https://cas.bjtu.edu.cn;
    proxy_set_header Referer https://cas.bjtu.edu.cn/;
    proxy_cookie_domain ~(.+) localhost;
    add_header 'Access-Control-Allow-Origin' 'https://hw.57d02.cn:8081' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
}

location /api_ai/ {
    # 预检请求处理
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://aiservice.bjtu.edu.cn';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Content-Length' 0;
        return 204;
    }

    proxy_pass https://aiservice.bjtu.edu.cn;
    proxy_ssl_verify off;
    proxy_set_header Host aiservice.bjtu.edu.cn;
    proxy_set_header Origin https://aiservice.bjtu.edu.cn;
    proxy_set_header Referer https://aiservice.bjtu.edu.cn;
    proxy_cookie_domain ~(.+) localhost;
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
}

location /api/ {
    set $ve_referer "http://123.121.147.7:88/ve/back/coursePlatform/coursePlatform.shtml?method=toCoursePlatform&courseToPage=10450&dataSource=1";
    if ($arg_courseId != "") {
        set $ve_referer "$ve_referer&courseId=$arg_courseId";
    }
    if ($arg_cId != "") {
        set $ve_referer "$ve_referer&cId=$arg_cId";
    }
    if ($arg_xkhId != "") {
        set $ve_referer "$ve_referer&xkhId=$arg_xkhId";
    }
    if ($arg_xqCode != "") {
        set $ve_referer "$ve_referer&xqCode=$arg_xqCode";
    }

    proxy_pass http://123.121.147.7:88/ve/;
    proxy_set_header Host 123.121.147.7:88;
    proxy_set_header Origin http://123.121.147.7:88;
    proxy_set_header Referer $ve_referer;
    proxy_set_header X-Requested-With XMLHttpRequest;
    proxy_cookie_path /ve/ /api/;
    proxy_cookie_domain ~(.+) localhost;
}

location ~ \.mjs$ {
    types {
        application/javascript mjs;
    }
    add_header Content-Type application/javascript;
}

# 错误处理
error_page 404 /index.html;
