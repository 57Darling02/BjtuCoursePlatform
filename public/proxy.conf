# /api -> http://123.121.147.7:88/ve
location = /api {
    proxy_pass http://123.121.147.7:88/ve;
    proxy_ssl_verify off;
    proxy_set_header Host 123.121.147.7:88;
    proxy_set_header Origin http://123.121.147.7:88;
    proxy_set_header Referer http://123.121.147.7:88/ve/back/coursePlatform/coursePlatform.shtml;
    proxy_set_header X-Requested-With XMLHttpRequest;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cookie_domain ~^ localhost;
    proxy_cookie_path /ve/ /api;
}

location /api/ {
    set $ve_referer "http://123.121.147.7:88/ve/back/coursePlatform/coursePlatform.shtml";
    set $is_data_syn 0;
    set $is_get_file_play_url 0;

    if ($uri ~ /back/coursePlatform/courseResource\.shtml$) {
        set $ve_referer "http://123.121.147.7:88/ve";
    }
    if ($uri ~ /back/rp/common/teachCalendar\.shtml$) {
        set $ve_referer "http://123.121.147.7:88/ve";
    }
    if ($uri ~ /back/coursePlatform/dataSynAction\.shtml$) {
        set $is_data_syn 1;
    }
    if ($arg_method = getFilePlayUrl) {
        set $is_get_file_play_url 1;
    }
    if ($is_data_syn$is_get_file_play_url = 11) {
        set $ve_referer "http://123.121.147.7:88/ve";
    }

    proxy_pass http://123.121.147.7:88/ve/;
    proxy_ssl_verify off;
    proxy_set_header Host 123.121.147.7:88;
    proxy_set_header Origin http://123.121.147.7:88;
    proxy_set_header Referer $ve_referer;
    proxy_set_header X-Requested-With XMLHttpRequest;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cookie_domain ~^ localhost;
    proxy_cookie_path /ve/ /api;
}

location ~ \.mjs$ {
    types {
        application/javascript mjs;
    }
    add_header Content-Type application/javascript;
}

error_page 404 /index.html;
